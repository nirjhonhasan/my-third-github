<!DOCTYPE html>

<body>
    <form action="page.php">
        <label for="fName">First Name: </label>
        <input type="text" name="fName" id="fName" placeholder="Enter your First Name Here" required><br>

        <label for="lName">Last Name: </label>
        <input type="text" name="lName" id="lName" placeholder="Enter your Last Name Here" required><br><br>

        <label for="mailAddress">Email: </label>
        <input type="email" name="mailAddress" id="mailAddress" placeholder="Enter your email" required><br>

        <label for="passWord">Password: </label>
        <input type="password" name="passWord" id="passWord" placeholder="Enter your Password" maxlength="12" required> <br><br>


        <label for="dob">Date of birth: </label>
        <input type="date" name="dob" id="dob"> <br><br>


        <fieldset>

            <input type="radio" name="gender" id="others">

        </fieldset>
         <br><br>



        <label for="paymentOption">Payment Option: </label>
        <select name="paymentOption" id="paymentOption">
            <option value="visa">Mada</option>
            <option value="visacard">Visa Card</option>
            <option value="mastercard">Master Card</option>
            <option value="applepay">Apple Pay</option>
        </select><br><br>
