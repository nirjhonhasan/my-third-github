<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Form | Hasan</title>
</head>
<body>
    <form action="page.php">
        <label for="fName">First Name: </label>
        <input type="text" name="fName" id="fName" placeholder="Enter your First Name Here" required><br>

        <label for="lName">Last Name: </label>
        <input type="text" name="lName" id="lName" placeholder="Enter your Last Name Here" required><br><br>

        <label for="mailAddress">Email: </label>
        <input type="email" name="mailAddress" id="mailAddress" placeholder="Enter your email" required><br>

        <label for="passWord">Password: </label>
        <input type="password" name="passWord" id="passWord" placeholder="Enter your Password" maxlength="12" required> <br><br>


        <label for="dob">Date of birth: </label>
        <input type="date" name="dob" id="dob">



        <h3>Gender: </h3>
        <label for="male">Male</label>
        <input type="radio" name="gender" id="male">

        <label for="female">Female</label>
        <input type="radio" name="gender" id="female">

        <label for="others">Others</label>
        <input type="radio" name="gender" id="others"> <br><br>


        <label for="paymentOption">Payment Option: </label>
        <select name="paymentOption" id="paymentOption">
            <option value="">Mada</option>
            <option value="">Visa Card</option>
            <option value="">Master Card</option>
            <option value="">Apple Pay</option>
        </select><br><br>

        <label for="comment">Comment your openion in the below:</label><br>
        <textarea name="comment" id="comment" rows="4" cols="30"></textarea><br><br>


        <input type="submit" name="submit" id="submit">
        <input type="reset">

    </form>
</body>
</html>
